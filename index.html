<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Test Card</title>
<style>
.grid-item { background:#fff; padding:20px; width:300px; margin:20px; border-radius:10px; cursor:pointer; box-shadow:0 2px 6px rgba(0,0,0,0.1); }
.expanded { max-height:0; overflow:hidden; transition:max-height 0.5s ease; }
.expanded.show { max-height:200px; }
</style>
</head>
<body>
<div class="grid-item" onclick="this.querySelector('.expanded').classList.toggle('show')">
  <h3>Field Reality</h3>
  <div class="expanded">
    <p>Expanded explanation inside the card.</p>
  </div>
</div>
</body>
</html>
